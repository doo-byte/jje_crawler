<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리 가족 제주 교육/강좌 알리미</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1c2430; --sub:#6b7686;
    --accent:#1a73e8; --sgp:#0d8a5f; --jj:#7b5cd6;
    --open:#e8f5e9; --open-ink:#1b7a34;
    --wait:#fff6e0; --wait-ink:#a06a00;
    --end:#f0f0f0; --end-ink:#888;
    --urgent:#d93025;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--ink);}
  header{background:#fff;border-bottom:1px solid #e3e7ee;padding:18px 20px 12px;position:sticky;top:0;z-index:10;}
  h1{margin:0 0 2px;font-size:20px;}
  .meta{font-size:12px;color:var(--sub);}
  .meta code{background:#eef1f5;padding:1px 5px;border-radius:4px;}
  .filters{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;align-items:center;}
  .fgroup{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
  .fgroup .lab{font-size:12px;color:var(--sub);margin-right:2px;}
  .chip{border:1px solid #ccd3dd;background:#fff;border-radius:16px;padding:4px 12px;font-size:13px;cursor:pointer;user-select:none;}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  #q{border:1px solid #ccd3dd;border-radius:16px;padding:5px 12px;font-size:13px;width:180px;}
  main{max-width:1060px;margin:0 auto;padding:16px 20px 60px;}
  .section-title{font-size:15px;font-weight:700;margin:22px 4px 10px;display:flex;gap:8px;align-items:center;}
  .section-title .cnt{font-size:12px;color:var(--sub);font-weight:400;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
  .card{background:var(--card);border:1px solid #e3e7ee;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;position:relative;}
  .card.sgp{border-left:4px solid var(--sgp);}
  .card.jj{border-left:4px solid var(--jj);}
  .card.etc{border-left:4px solid #b9c2cf;}
  .row1{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;}
  .b-open{background:var(--open);color:var(--open-ink);}
  .b-wait{background:var(--wait);color:var(--wait-ink);}
  .b-end{background:var(--end);color:var(--end-ink);}
  .b-dday{background:#e8f0fe;color:var(--accent);}
  .b-dday.urgent{background:#fde7e5;color:var(--urgent);}
  .b-region{background:#eef1f5;color:#445;}
  .title{font-size:14px;font-weight:700;line-height:1.45;}
  .title a{color:inherit;text-decoration:none;}
  .title a:hover{color:var(--accent);text-decoration:underline;}
  .org{font-size:12px;color:var(--sub);}
  .dates{font-size:12px;line-height:1.7;color:#3a4452;}
  .dates b{display:inline-block;width:58px;color:var(--sub);font-weight:400;}
  .fits{display:flex;gap:5px;flex-wrap:wrap;}
  .fit{font-size:11px;padding:2px 8px;border-radius:10px;background:#f1ecfd;color:#5a3fc0;}
  .fit.f1{background:#e3f2fd;color:#0b62c4;}
  .fit.f2{background:#e6f7ef;color:#0d8a5f;}
  .cap{font-size:12px;color:var(--sub);}
  .empty{color:var(--sub);font-size:13px;padding:20px 6px;}
  footer{max-width:1060px;margin:0 auto;padding:0 20px 40px;font-size:12px;color:var(--sub);line-height:1.8;}
  @media (max-width:600px){ .grid{grid-template-columns:1fr;} #q{width:130px;} }
</style>
</head>
<body>
<header>
  <h1>🏝️ 우리 가족 제주 교육/강좌 알리미</h1>
  <div class="meta">수집 기준: <span id="crawledAt">-</span> ·
    갱신하려면 <code>python crawl.py</code> 실행 후 새로고침 ·
    출처: <a href="https://org.jje.go.kr/reserve/jjeEducation/list.jje?menuCd=DOM_000000502001000000" target="_blank">제주도교육청 통합예약시스템</a></div>
  <div class="filters">
    <div class="fgroup" id="fRegion">
      <span class="lab">지역</span>
      <span class="chip on" data-v="">전체</span>
      <span class="chip" data-v="서귀포시">서귀포시</span>
      <span class="chip" data-v="제주시">제주시</span>
      <span class="chip" data-v="기타/공통">기타</span>
    </div>
    <div class="fgroup" id="fFit">
      <span class="lab">대상</span>
      <span class="chip on" data-v="">전체</span>
      <span class="chip" data-v="child12">첫째 (초6)</span>
      <span class="chip" data-v="child6">둘째 (6세)</span>
      <span class="chip" data-v="parent">부모·가족</span>
    </div>
    <div class="fgroup">
      <input id="q" type="search" placeholder="검색 (예: 영어, 수학)">
    </div>
  </div>
</header>

<main>
  <div id="secOpen">
    <div class="section-title">🟢 지금 접수중 <span class="cnt"></span></div>
    <div class="grid"></div>
  </div>
  <div id="secSoon">
    <div class="section-title">🟡 접수 예정 <span class="cnt"></span></div>
    <div class="grid"></div>
  </div>
  <div id="secEnd">
    <div class="section-title">⚪ 마감 / 대기접수 <span class="cnt"></span></div>
    <div class="grid"></div>
  </div>
</main>

<footer>
  ※ 서귀포시 강좌는 초록 테두리로 표시되며 각 구역 안에서 먼저 정렬됩니다.<br>
  ※ '첫째(초6)/둘째(6세)' 판별은 강좌 세부사항의 학년·나이 표기를 자동 분석한 것이므로, 신청 전 상세 페이지에서 꼭 확인하세요.
</footer>

<script src="data.js"></script>
<script>
const now = new Date();
document.getElementById("crawledAt").textContent = typeof CRAWLED_AT !== "undefined" ? CRAWLED_AT : "data.js 없음 — crawl.py를 먼저 실행하세요";

function parsePeriod(s){
  // "2026-07-13 10:00 ~ 2026-07-20 17:00"
  const m = s.match(/(\d{4}-\d{2}-\d{2})(?:\s+(\d{2}:\d{2}))?\s*~\s*(\d{4}-\d{2}-\d{2})(?:\s+(\d{2}:\d{2}))?/);
  if(!m) return {start:null,end:null};
  return {
    start: new Date(m[1] + "T" + (m[2]||"00:00")),
    end:   new Date(m[3] + "T" + (m[4]||"23:59"))
  };
}
function dday(target){
  const d0 = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const d1 = new Date(target.getFullYear(),target.getMonth(),target.getDate());
  return Math.round((d1-d0)/86400000);
}

const items = (typeof EDU_DATA!=="undefined" ? EDU_DATA : []).map(it=>{
  const p = parsePeriod(it.applyPeriod);
  let bucket, sortKey, ddayInfo="";
  if(p.start && now < p.start){
    bucket="soon"; sortKey = p.start.getTime();
    const d = dday(p.start);
    ddayInfo = d===0 ? "오늘 접수시작" : `접수시작 D-${d}`;
  } else if(p.end && now <= p.end && it.status!=="마감"){
    bucket="open"; sortKey = p.end.getTime();
    const d = dday(p.end);
    ddayInfo = d===0 ? "오늘 마감!" : `마감 D-${d}`;
    it._urgent = d<=3;
  } else {
    bucket="end"; sortKey = -(p.end?p.end.getTime():0);
    ddayInfo = it.status==="대기접수" ? "대기접수 가능" : "접수 종료";
  }
  return {...it, _bucket:bucket, _sort:sortKey, _dday:ddayInfo, _p:p};
});

const state = {region:"", fit:"", q:""};

function regionCls(r){ return r==="서귀포시"?"sgp":(r==="제주시"?"jj":"etc"); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function card(it){
  const stBadge = it._bucket==="open" ? (it.status==="대기접수" ? '<span class="badge b-wait">대기접수</span>' : '<span class="badge b-open">접수중</span>')
                : it._bucket==="soon" ? '<span class="badge b-wait">예정</span>'
                : `<span class="badge b-end">${esc(it.status)}</span>`;
  const dd = it._dday ? `<span class="badge b-dday ${it._urgent?"urgent":""}">${it._dday}</span>` : "";
  const fits = [
    it.fit.child12 ? '<span class="fit f1">첫째(초6) 가능</span>' : "",
    it.fit.child6  ? '<span class="fit f2">둘째(6세) 가능</span>' : "",
    it.fit.parent  ? '<span class="fit">부모·가족</span>' : ""
  ].join("");
  const cap = it.capacity ? `모집 ${esc(it.capacity)}` + (it.applied?` · 신청 ${esc(it.applied)}`:"") : "";
  return `<div class="card ${regionCls(it.region)}">
    <div class="row1">${stBadge}${dd}<span class="badge b-region">${esc(it.region)}</span></div>
    <div class="title"><a href="${esc(it.url)}" target="_blank">${esc(it.title)}</a></div>
    <div class="org">${esc(it.org)}${it.category?" · "+esc(it.category):""}</div>
    <div class="dates">
      <b>접수기간</b>${esc(it.applyPeriod)}<br>
      <b>교육기간</b>${esc(it.eduPeriod)}
    </div>
    <div class="fits">${fits||'<span class="fit" style="background:#f5f5f5;color:#999">대상: '+esc(it.targets.join(", "))+"</span>"}</div>
    ${cap?`<div class="cap">${cap}</div>`:""}
  </div>`;
}

function render(){
  const q = state.q.toLowerCase();
  const pass = it =>
    (!state.region || it.region===state.region) &&
    (!state.fit || it.fit[state.fit]) &&
    (!q || (it.title+it.org+(it.detail||"")).toLowerCase().includes(q));

  const regionRank = r => r==="서귀포시"?0:(r==="제주시"?1:2);
  const bySec = {open:[],soon:[],end:[]};
  items.filter(pass).forEach(it=>bySec[it._bucket].push(it));
  for(const k in bySec) bySec[k].sort((a,b)=> regionRank(a.region)-regionRank(b.region) || a._sort-b._sort);

  [["secOpen","open"],["secSoon","soon"],["secEnd","end"]].forEach(([id,key])=>{
    const sec = document.getElementById(id);
    const list = bySec[key];
    sec.querySelector(".cnt").textContent = `${list.length}건`;
    sec.querySelector(".grid").innerHTML = list.map(card).join("") ||
      '<div class="empty">해당하는 강좌가 없습니다.</div>';
  });
}

document.querySelectorAll(".fgroup").forEach(g=>{
  g.addEventListener("click",e=>{
    const chip = e.target.closest(".chip"); if(!chip) return;
    g.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));
    chip.classList.add("on");
    if(g.id==="fRegion") state.region = chip.dataset.v;
    if(g.id==="fFit") state.fit = chip.dataset.v;
    render();
  });
});
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;render();});

render();
</script>
</body>
</html>
